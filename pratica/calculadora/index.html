<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6db746f974.js" crossorigin="anonymous"></script>
</head>
<body>
    <main>
        <div class="calculadora">
            <div class="resul">
                
            </div>
            <div class="teclas">

                <div class="l-teclas">
                    <div class="tecla" id="limpar">
                        C
                    </div>
                    <div class="tecla" id="deletar">
                        <i class="fa-solid fa-delete-left"></i>
                    </div>
                    <div class="tecla" id="porcentagem">
                        %
                    </div>
                    <div class="tecla" id="dividir">
                        ÷
                    </div>
                </div>

                <div class="l-teclas">
                    <div class="tecla" id="sete">
                        7
                    </div>
                    <div class="tecla" id="oito">
                        8
                    </div>
                    <div class="tecla" id="nove">
                        9
                    </div>
                    <div class="tecla" id="mult">
                        ×
                    </div>
                </div>

                <div class="l-teclas">
                    <div class="tecla" id="quatro">
                        4
                    </div>
                    <div class="tecla" id="cinco">
                        5
                    </div>
                    <div class="tecla" id="seis">
                        6
                    </div>
                    <div class="tecla" id="sub">
                        -
                    </div>
                </div>

                <div class="l-teclas">
                    <div class="tecla" id="um">
                        1
                    </div>
                    <div class="tecla" id="dois">
                        2
                    </div>
                    <div class="tecla" id="tres">
                        3
                    </div>
                    <div class="tecla" id="soma">
                        +
                    </div>
                </div>

                <div class="l-teclas">
                    <div class="tecla" id="zero">
                        0
                    </div>
                    <div class="tecla" id="igual">
                        =
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
